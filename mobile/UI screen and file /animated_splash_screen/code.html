<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&amp;family=Poppins:wght@700&amp;family=Special+Elite&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#0A0A0F",
              "neon-purple": "#bc13fe",
              "neon-cyan": "#00f3ff",
            },
            fontFamily: {
              "display": ["Public Sans"],
              "poppins": ["Poppins"],
              "typewriter": ["Special Elite"],
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Gossip Monkey Splash</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
@keyframes pulse-glow {
  0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(188, 19, 254, 0.3); }
  50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(188, 19, 254, 0.6), 0 0 20px rgba(0, 243, 255, 0.4); }
}
@keyframes typewriter {
  from { width: 0; } to { width: 100%; }
}
@keyframes blink-caret {
  from, to { border-color: transparent; } 50% { border-color: #00f3ff; }
}
@keyframes fade-slide-up {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes float-particle {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  50% { opacity: 0.5; }
  100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
}
@keyframes nebula-drift {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-45%, -55%) scale(1.2); }
}
.animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
.animate-fade-slide { animation: fade-slide-up 1s ease-out forwards; animation-delay: 1.5s; opacity: 0; }
.typewriter-effect {
  overflow: hidden;
  white-space: nowrap;
  border-right: .15em solid transparent;
  animation: typewriter 2s steps(40, end), blink-caret .75s step-end infinite;
  animation-delay: 0.5s;
  width: 0;
  animation-fill-mode: forwards;
}
</style></head>
<body class="bg-background-dark font-display overflow-hidden">
<!-- Splash Screen Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-center bg-background-dark overflow-hidden"><div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute w-1 h-1 bg-neon-cyan rounded-full" style="top: 90%; left: 20%; animation: float-particle 8s infinite;"></div>
<div class="absolute w-2 h-2 bg-neon-purple rounded-full" style="top: 85%; left: 70%; animation: float-particle 12s infinite 2s;"></div>
<div class="absolute w-1 h-1 bg-white rounded-full" style="top: 95%; left: 45%; animation: float-particle 10s infinite 1s;"></div>
<div class="absolute w-1.5 h-1.5 bg-neon-cyan rounded-full" style="top: 80%; left: 85%; animation: float-particle 15s infinite 5s;"></div>
</div>
<!-- Subtle Purple Glow Effects -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-neon-purple/20 rounded-full blur-[120px] animate-[nebula-drift_15s_infinite_alternate]"></div>
<div class="absolute top-1/4 left-1/3 w-[300px] h-[300px] bg-neon-cyan/10 rounded-full blur-[100px]"></div>
<!-- Main Content Area -->
<div class="relative z-10 flex flex-col items-center gap-8 @container">
<!-- Logo Section -->
<div class="flex flex-col items-center gap-6">
<div class="relative">
<!-- Neon Ring Background -->
<div class="absolute inset-0 rounded-full bg-gradient-to-tr from-neon-purple to-neon-cyan opacity-20 blur-xl scale-110"></div>
<!-- Stylized Monkey Icon -->
<div class="relative bg-background-dark border-2 border-neon-purple/50 rounded-3xl p-8 shadow-[0_0_40px_rgba(188,19,254,0.3)] animate-pulse-glow">
<span class="material-symbols-outlined text-8xl bg-gradient-to-br from-neon-purple to-neon-cyan bg-clip-text text-transparent" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                            smart_toy
                        </span>
</div>
</div>
<!-- Text Branding -->
<div class="flex flex-col items-center justify-center space-y-2">
<h1 class="text-slate-100 font-poppins text-5xl md:text-6xl font-bold tracking-tight text-center drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] typewriter-effect mx-auto">
                        Gossip Monkey
                    </h1>
<div class="h-1 w-12 bg-primary rounded-full mb-2"></div>
<p class="text-neon-cyan/80 font-typewriter text-lg md:text-xl tracking-[0.2em] uppercase text-center animate-fade-slide">
                        Where Vibes Have Life
                    </p>
</div>
</div>
</div>
<!-- Bottom Loading Section -->
<div class="absolute bottom-16 left-0 right-0 px-8 flex flex-col items-center gap-4">
<div class="w-full max-w-xs space-y-3">
<div class="flex justify-between items-end px-1">
<p class="text-slate-400 text-xs font-medium tracking-widest uppercase">Initializing Vibe Engine</p>
<p class="text-neon-purple text-xs font-bold">68%</p>
</div>
<!-- Loading Indicator Component -->
<div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden border border-white/10">
<div class="h-full bg-gradient-to-r from-neon-purple to-neon-cyan rounded-full shadow-[0_0_10px_rgba(188,19,254,0.8)]" style="width: 68%;"></div>
</div>
</div>
<!-- Footer Meta -->
<div class="flex items-center gap-2 text-slate-500 text-[10px] tracking-tighter opacity-50 uppercase mt-4">
<span>Secure Connection Established</span>
<span class="w-1 h-1 rounded-full bg-green-500 shadow-[0_0_5px_rgba(34,197,94,0.8)]"></span>
</div>
</div>
<!-- Background Image/Texture Decoration -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay" data-alt="Subtle geometric noise and grid pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAedkAJAblsDQojbzWysJMQ5REBd63j_SQ-C_f3AI_AV051lfeGbZN5-zpwVvNNHFSrWJGJSv_Xfwka4jdCRylXQVVlAyQ6Q4Gy7AvpotRuBs6HVai_b8ideSYSNe6modXnND70F6HRfXbwrtg1Ranu7bzraNnGhlw5IBAeh2t9N9VA0roH2C2CplYkx7XEp3XkAD8_Lo1zmiXKSDk0ns4GChfez05zvDOG5wK1exX9S9BcMi9W5smamkp7qoDn7WSH94QNrLYXDqM');">
</div>
</div>
</body></html>
