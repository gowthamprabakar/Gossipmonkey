<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join Private Jungle - Gossip Monkey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#120a07",
                        "neon-purple": "#bc13fe",
                        "neon-cyan": "#00f3ff",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bg-deep-space {
            background: radial-gradient(circle at top right, #2d1b4e, #120a07);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col bg-deep-space overflow-x-hidden">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-100 hover:text-primary transition-colors flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Join Private Jungle</h2>
</div>

<div class="flex flex-col items-center justify-center py-8">
<div class="relative w-32 h-32 flex items-center justify-center rounded-full bg-gradient-to-tr from-neon-purple/20 to-neon-cyan/20 border border-white/10 shadow-2xl">
<div class="absolute inset-0 blur-xl bg-primary/20 rounded-full"></div>
<span class="material-symbols-outlined text-6xl text-slate-100 z-10" style="font-variation-settings: 'FILL' 1;">lock</span>
<div class="absolute -bottom-2 -right-2 bg-primary p-2 rounded-full border-2 border-background-dark">
<span class="material-symbols-outlined text-white text-xl">poker_chip</span>

<!-- PIN Input Section -->
<div class="px-6 py-4">
<h4 class="text-slate-100 text-center text-sm font-bold mb-6">Enter 6-Digit Secret Key</h4>
<div class="flex justify-between gap-2 max-w-md mx-auto">
<div class="glass-box w-12 h-16 rounded-xl flex items-center justify-center text-2xl font-bold text-neon-cyan border-b-2 border-b-neon-cyan shadow-[0_0_15px_rgba(0,243,255,0.3)]">7</div>
<div class="glass-box w-12 h-16 rounded-xl flex items-center justify-center text-2xl font-bold text-neon-cyan border-b-2 border-b-white/20"></div>
<div class="glass-box w-12 h-16 rounded-xl flex items-center justify-center text-2xl font-bold text-neon-cyan border-b-2 border-b-white/20"></div>
<div class="glass-box w-12 h-16 rounded-xl flex items-center justify-center text-2xl font-bold text-neon-cyan border-b-2 border-b-white/20"></div>
<div class="glass-box w-12 h-16 rounded-xl flex items-center justify-center text-2xl font-bold text-neon-cyan border-b-2 border-b-white/20"></div>
<div class="glass-box w-12 h-16 rounded-xl flex items-center justify-center text-2xl font-bold text-neon-cyan border-b-2 border-b-white/20"></div>
</div>
</div>
<!-- Unlock Button -->
<div class="px-6 py-8">
<button class="w-full h-14 rounded-2xl bg-gradient-to-r from-neon-purple to-neon-cyan text-slate-900 text-lg font-bold tracking-wider uppercase shadow-[0_0_30px_rgba(188,19,254,0.4)] hover:scale-[1.02] transition-transform active:scale-95">
                Unlock Jungle
            </button>
</div>
<!-- Numeric Keypad -->
<div class="mt-auto bg-black/40 backdrop-blur-md rounded-t-[2.5rem] border-t border-white/5 p-8">
<div class="grid grid-cols-3 gap-6 max-w-sm mx-auto">
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">1</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">2</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">3</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">4</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">5</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">6</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">7</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">8</button>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">9</button>
<div class="h-12"></div>
<button class="h-12 flex items-center justify-center text-2xl font-semibold text-slate-100 hover:bg-white/10 rounded-full transition-colors">0</button>
<button class="h-12 flex items-center justify-center text-slate-100 hover:bg-white/10 rounded-full transition-colors">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Footer Text -->
<p class="text-center text-slate-500 text-xs mt-8 pb-4">
                Don't have a code? <span class="text-primary font-bold cursor-pointer">Ask the room owner for an invite.</span>
</p>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-30 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-[20%] left-[-15%] w-80 h-80 bg-neon-purple rounded-full blur-[150px]"></div>
</div>
</body></html>
