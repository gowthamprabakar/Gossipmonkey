<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gossip Monkey - Create Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#120a07",
                        "accent-purple": "#8b5cf6",
                        "accent-cyan": "#22d3ee",
                        "glass-dark": "rgba(34, 22, 16, 0.7)"
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(45, 23, 54, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(236, 91, 19, 0.2);
        }
        .gradient-btn {
            background: linear-gradient(135deg, #a855f7 0%, #22d3ee 100%);
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23ec5b13' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl border-x border-primary/10">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-primary/10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 px-4">Create Room</h2>
<div class="size-10"></div> <!-- Spacer for balance -->
</header>
<!-- Room Type Tabs -->
<div class="px-4 py-4">
<div class="flex bg-primary/10 p-1 rounded-xl">
<button class="flex items-center justify-center bg-primary text-white py-2 px-4 rounded-lg flex-1 font-bold text-sm transition-all">
<span class="material-symbols-outlined text-sm mr-2">public</span>
                    Public
                </button>
<button class="flex items-center justify-center text-slate-600 dark:text-slate-400 py-2 px-4 rounded-lg flex-1 font-bold text-sm transition-all hover:bg-primary/5">
<span class="material-symbols-outlined text-sm mr-2">lock</span>
                    Private
                </button>
</div>
</div>
<main class="flex-1 overflow-y-auto">
<!-- Room Info -->
<div class="space-y-4 px-4 py-2">
<label class="block group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 block px-1">Room Name</span>
<input class="w-full rounded-xl border-primary/20 bg-white dark:bg-white/5 focus:border-primary focus:ring-primary text-slate-900 dark:text-white placeholder:text-slate-400 p-4 transition-all" placeholder="e.g. The Tea Room ☕️" type="text"/>
</label>
<label class="block group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 block px-1">Description</span>
<textarea class="w-full rounded-xl border-primary/20 bg-white dark:bg-white/5 focus:border-primary focus:ring-primary text-slate-900 dark:text-white placeholder:text-slate-400 p-4 min-h-[100px] transition-all" placeholder="What's the hot gossip today? Spill it here..."></textarea>
</label>
<label class="block group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 block px-1">Monkey Personality</span>
<select class="w-full rounded-xl border-primary/20 bg-white dark:bg-white/5 focus:border-primary focus:ring-primary text-slate-900 dark:text-white p-4 transition-all">
<option value="hype">🔥 Hype - Pure Energy</option>
<option value="wise">🧘 Wise - Thoughtful &amp; Deep</option>
<option selected="" value="chaos">🌀 Chaos - Unpredictable</option>
<option value="detective">🕵️ Detective - Finding Truths</option>
</select>
</label>
</div>
<!-- Advanced Settings (Expandable Style) -->
<div class="mt-6 px-4">
<div class="glass-panel rounded-2xl p-4 overflow-hidden">
<button class="flex w-full items-center justify-between py-1">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">settings</span>
<span class="font-bold text-slate-900 dark:text-white">Advanced Settings</span>
</div>
<span class="material-symbols-outlined text-slate-400">expand_more</span>
</button>
<div class="mt-6 space-y-6">
<div class="flex items-center justify-between">
<div>
<p class="font-semibold text-slate-900 dark:text-white text-sm">Slow Mode</p>
<p class="text-xs text-slate-500">Limits message frequency</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<div class="flex items-center justify-between">
<div>
<p class="font-semibold text-slate-900 dark:text-white text-sm">Image Only Mode</p>
<p class="text-xs text-slate-500">Visuals only channel</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<div class="space-y-3 pt-2">
<div class="flex justify-between items-center">
<p class="font-semibold text-slate-900 dark:text-white text-sm">Min Banana Score</p>
<span class="bg-primary/20 text-primary px-2 py-0.5 rounded text-xs font-bold">500</span>
</div>
<input class="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary" max="1000" min="0" step="50" type="range" value="500"/>
<div class="flex justify-between text-[10px] text-slate-500 font-bold uppercase tracking-wider">
<span>Noob</span>
<span>Gorilla Elite</span>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Footer Button -->
<footer class="p-6 mt-4">
<button class="gradient-btn w-full py-4 rounded-2xl text-white font-extrabold text-lg shadow-[0_8px_30px_rgb(139,92,246,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>CREATE ROOM</span>
<span class="material-symbols-outlined font-bold">rocket_launch</span>
</button>
<p class="text-center text-slate-500 text-xs mt-4 font-medium italic">
                By creating a room, you agree to the Jungle Laws &amp; Community Guidelines.
            </p>
</footer>
<!-- Background Glows -->
<div class="fixed top-[-10%] left-[-20%] w-[60%] h-[40%] bg-primary/20 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-[-10%] right-[-20%] w-[60%] h-[40%] bg-accent-purple/20 blur-[120px] rounded-full pointer-events-none -z-10"></div>
</div>
</body></html>
