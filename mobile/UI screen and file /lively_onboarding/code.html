<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gossip Monkey Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13", // Theme default primary
                        "accent-purple": "#a855f7",
                        "accent-cyan": "#06b6d4",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0a0503",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-shadow-purple {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        .neon-shadow-cyan {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
            50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.6), 0 0 60px rgba(6, 182, 212, 0.2); }
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bg-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        .animate-glow { animation: glow-pulse 4s infinite; }
        .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
        .animate-bg-pulse { animation: bg-pulse 10s infinite alternate; }
        .glass-card:hover { transform: scale(1.02) rotate(1deg); transition: all 0.5s ease; }
    </style></head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<div class="flex items-center p-6 justify-end z-10">
<button class="text-accent-purple font-bold leading-normal tracking-wider hover:opacity-80 transition-opacity">
                SKIP
            </button>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6 relative">
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-24 -left-24 w-64 h-64 bg-accent-purple/20 rounded-full blur-[80px] animate-bg-pulse"></div>
<div class="absolute top-1/2 -right-32 w-80 h-80 bg-accent-cyan/10 rounded-full blur-[100px]"></div>
</div>
<div class="w-full max-w-sm glass-card rounded-3xl p-6 relative overflow-hidden neon-shadow-purple border border-accent-purple/20 animate-float animate-glow transition-all duration-500">
<div class="flex items-center gap-3 mb-6">
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-accent-purple to-accent-cyan p-0.5">
<div class="w-full h-full rounded-full bg-background-dark flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Stylized neon monkey avatar with headphones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUwoAFAXJHQmPnRUlMjXL-UkUGeIeqJjC2bHX12QIfwTTZM0IcINOcKR4TlXPq8ZK4XgKhXrW5xDL33jOqJnGNtocqiMdBQCifi8GJ3kJ-EbeZZv0_HkiG28IxHSqoQJfDRFO_2eMWWRVPiuROp3xyz0Tk5DNOW2FS4KpRtgzMmq8Wez9ZNUD9VJbW4uVWXsS8z02EBLEhMNE6MFmOokhfs5chjMjxmfN469G6-dxZ9j0Zg_50p5Rqb1wl8PdDCfl3kDXxPsO1HT0"/>
</div>
</div>
<div>
<h3 class="text-white font-bold text-sm">Gossip Monkey AI</h3>
<div class="flex items-center gap-1.5">
<div class="w-2 h-2 rounded-full bg-accent-cyan animate-pulse"></div>
<span class="text-[10px] text-accent-cyan uppercase tracking-widest font-bold">Online</span>
</div>
</div>
</div>
<div class="space-y-4">
<div class="flex justify-start">
<div class="bg-white/10 rounded-2xl rounded-tl-none p-3 max-w-[80%]">
<p class="text-sm text-slate-200">Welcome to the jungle! Which room are we roasting today? 🔥</p>
</div>
</div>
<div class="flex justify-end">
<div class="bg-accent-purple/20 border border-accent-purple/30 rounded-2xl rounded-tr-none p-3 max-w-[80%]">
<p class="text-sm text-slate-100 font-medium">Show me the Living AI rooms!</p>
</div>
</div>
<div class="flex justify-start">
<div class="bg-white/10 rounded-2xl rounded-tl-none p-3 max-w-[80%]">
<div class="flex gap-1">
<span class="w-1.5 h-1.5 bg-accent-cyan rounded-full animate-bounce"></span>
<span class="w-1.5 h-1.5 bg-accent-cyan rounded-full animate-bounce [animation-delay:0.2s]"></span>
<span class="w-1.5 h-1.5 bg-accent-cyan rounded-full animate-bounce [animation-delay:0.4s]"></span>
</div>
</div>
</div>
</div>
<div class="mt-8 flex items-center gap-2 bg-white/5 rounded-full px-4 py-2 border border-white/10">
<span class="material-symbols-outlined text-accent-cyan text-sm">auto_awesome</span>
<span class="text-xs text-slate-400">Monkey is thinking...</span>
</div>
</div>
<div class="mt-12 text-center max-w-xs">
<h1 class="text-white text-3xl font-black leading-tight mb-4 tracking-tight italic animate-slide-up opacity-0">
                    Rooms with <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent-purple to-accent-cyan">Living AIs</span>
</h1>
<p class="text-slate-400 text-base font-medium leading-relaxed animate-slide-up opacity-0 [animation-delay:0.2s]">
                    Step into a world where every room is alive with personality and high-energy vibes.
                </p>
</div>
</div>
<div class="p-8 flex flex-col items-center gap-8">
<div class="flex gap-3">
<div class="h-1.5 w-8 rounded-full bg-gradient-to-r from-accent-purple to-accent-cyan animate-pulse"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-700"></div>
</div>
<button class="w-full max-w-sm bg-gradient-to-r from-accent-purple to-accent-cyan py-4 rounded-2xl flex items-center justify-center gap-2 group hover:opacity-90 transition-all neon-shadow-cyan relative overflow-hidden"><div class="absolute inset-0 animate-shimmer pointer-events-none"></div>
<span class="text-white font-bold text-lg tracking-wide">CONTINUE</span>
<span class="material-symbols-outlined text-white transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</div>
</body></html>
